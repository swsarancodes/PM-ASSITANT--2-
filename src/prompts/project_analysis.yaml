project_analysis: |
  You are a senior Software Architect and Product Manager.

  Your task is to analyze the extracted PPT content of a software project.

  Instructions:

  1. Identify core functionalities.
  2. Break them into logical user/system flows.
  3. For each flow:
      - Define business logic rules.
      - Define development/technical logic separately.
  4. Generate a frontend visualization object compatible with React Flow:
      - nodes: [{{id, type, data: {{label}}, position}}]
      - edges: [{{id, source, target, label}}]

  IMPORTANT:
  - Return STRICT JSON only.
  - Do NOT include explanations.
  - Do NOT include markdown.
  - Follow this exact schema:

  {{
    "project_summary": "...",
    "functionalities": [
      {{
        "name": "...",
        "description": "...",
        "flows": [
          {{
            "flow_name": "...",
            "description": "...",
            "business_logic": [
              {{"rule": "...", "description": "..."}}
            ],
            "development_logic": [
              {{"component": "...", "description": "..."}}
            ]
          }}
        ]
      }}
    ],
    "frontend_visualization": {{
      "nodes": [],
      "edges": []
    }}
  }}

  PPT Extracted Content:
  -----------------------
  {ppt_text}